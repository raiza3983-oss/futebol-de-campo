<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Futebol de Campo — Raiz Rural / Raiz Florestal</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- TELA PRINCIPAL -->
  <section id="home" class="screen active">
    <div class="hero-card">
      <h1>⚽ FUTEBOL DE CAMPO</h1>
      <p>Raiz Rural • Raiz Florestal</p>

      <button onclick="goTo('login')">Entrar com Google</button>
      <button onclick="goTo('playerEditor')">Criar Jogador</button>
      <button onclick="goTo('teamBuilder')">Criar Time</button>
      <button onclick="goTo('matchConfig')">Jogar Partida 4x4</button>
      <button onclick="goTo('admin')">Painel Administrativo</button>
    </div>
  </section>

  <!-- LOGIN -->
  <section id="login" class="screen">
    <div class="card">
      <h2>Entrar</h2>
      <p>Login com Google (ligaremos depois)</p>
      <button onclick="goTo('home')">Voltar</button>
    </div>
  </section>

  <!-- EDITOR DE JOGADOR -->
  <section id="playerEditor" class="screen">
    <div class="card">
      <h2>Criar / Editar Jogador</h2>

      <input id="playerName" placeholder="Nome do jogador">

      <select id="playerSex">
        <option>Masculino</option>
        <option>Feminino</option>
      </select>

      <select id="playerPosition">
        <option>Goleiro</option>
        <option>Zagueiro</option>
        <option>Meio</option>
        <option>Atacante</option>
      </select>

      <button onclick="savePlayer()">Salvar jogador</button>
      <button class="secondary" onclick="removePlayer()">Excluir último</button>

      <div id="playersList"></div>

      <button onclick="goTo('home')">Voltar</button>
    </div>
  </section>

  <!-- CRIAR TIME -->
  <section id="teamBuilder" class="screen">
    <div class="card">
      <h2>Montar Time</h2>
      <p>4 titulares + 4 reservas</p>

      <div id="teamList"></div>

      <button onclick="goTo('home')">Voltar</button>
    </div>
  </section>

  <!-- CONFIG PARTIDA -->
  <section id="matchConfig" class="screen">
    <div class="card">
      <h2>Configurar Partida</h2>

      <label>Campo</label>
      <select>
        <option>Barro</option>
        <option>Areia</option>
        <option>Terra</option>
        <option>Praia</option>
        <option>Capim</option>
      </select>

      <label>Câmera</label>
      <select>
        <option>Perto</option>
        <option>Longe</option>
      </select>

      <label>Tempo</label>
      <select>
        <option>2 minutos</option>
        <option>4 minutos</option>
      </select>

      <button>Começar Jogo</button>
      <button class="secondary" onclick="goTo('home')">Voltar</button>
    </div>
  </section>

  <!-- ADMIN -->
  <section id="admin" class="screen">
    <div class="card">
      <h2>Painel Administrativo</h2>
      <p>Criar torneios / controlar partidas / cadastro</p>
      <button onclick="goTo('home')">Voltar</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
