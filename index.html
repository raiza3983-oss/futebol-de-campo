<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Futebol de Campo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stadium-bg"></div>
<div class="overlay"></div>

<div class="app">

  <header class="topbar">
    <div class="player-box">
      <div class="avatar">⚽</div>
      <div>
        <h3>JOGADOR 01</h3>
        <p>Conectado com Google</p>
      </div>
    </div>

    <div class="top-actions">
      <button>🏆 Ranking</button>
      <button>📖 Manual</button>
      <button>⚙ Config</button>
    </div>
  </header>

  <main class="hero">
    <h1>FUTEBOL DE CAMPO</h1>
    <h2>Raiz Rural • Raiz Florestal</h2>
    <div class="tag">4x4</div>

    <div class="scoreboard">
      <span>Casa 0</span>
      <strong>00:00</strong>
      <span>Visitante 0</span>
    </div>
  </main>

  <section class="menu-grid">
    <button class="green" onclick="abrirPartida()">
  ▶ JOGAR
</button>
    <button class="gold">🏆 TORNEIOS</button>
    <button class="blue">🛡 SELEÇÃO DE TIMES</button>
    <button class="purple" onclick="criarJogadorCompleto()">
  👤 CRIAR JOGADOR
    </button>
    <button class="gray" onclick="criarTime()">
  👥 ADMINISTRAR TIMES
    </button>
    <button class="red">⚙ CONFIGURAÇÕES</button>
  </section>

  <footer class="footer-bar">
    ESTÁDIO RAIZ • Torcida Real • Campo 4x4
  </footer>

</div>

<script src="app.js"></script> 
  <script src="player-editor.js"></script>
  <script src="team-builder.js"></script>
  <script src="game-engine.js"></script>
</body>
</html>
