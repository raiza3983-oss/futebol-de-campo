<!doctype html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Futebol de Campo</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f1f10;
color:white;
}

header{
padding:20px;
text-align:center;
background:#1f7a32;
font-size:28px;
font-weight:bold;
}

.sub{
font-size:14px;
opacity:.8;
}

.container{
padding:20px;
}

.card{
background:#1c2a1c;
padding:20px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

button,select,input{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:12px;
font-size:16px;
}

button{
background:#33aa44;
color:white;
font-weight:bold;
}

.player{
background:#243424;
padding:12px;
border-radius:12px;
margin-top:10px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<header>
⚽ FUTEBOL DE CAMPO
<div class="sub">Raiz Rural • Raiz Florestal</div>
</header>

<div class="container">

<div class="card">
<button onclick="abrirEditor()">Criar / Editar Jogador</button>
<button onclick="abrirTime()">Adicionar ao Time</button>
<button onclick="abrirPartida()">Partida 4x4</button>
</div>

<div id="editor" class="card hidden">
<h2>Jogador</h2>

<input id="nome" placeholder="Nome do jogador">

<select id="sexo">
<option>Masculino</option>
<option>Feminino</option>
</select>

<select id="posicao">
<option>Goleiro</option>
<option>Zagueiro</option>
<option>Meio</option>
<option>Atacante</option>
</select>

<button onclick="salvarJogador()">Salvar jogador</button>
<button onclick="excluirJogador()">Excluir último jogador</button>

<div id="listaJogadores"></div>
</div>

<div id="time" class="card hidden">
<h2>Time (4 titulares + 4 reservas)</h2>
<div id="listaTime"></div>
</div>

<div id="partida" class="card hidden">
<h2>Configuração da partida</h2>

<select>
<option>Barro</option>
<option>Areia</option>
<option>Terra</option>
<option>Praia</option>
<option>Capim</option>
</select>

<select>
<option>Câmera perto</option>
<option>Câmera longe</option>
</select>

<select>
<option>2 minutos</option>
<option>4 minutos</option>
</select>

<button onclick="alert('🔔 Apito inicial! Começou a partida.')">
Iniciar Partida
</button>
</div>

</div>

<script>
let jogadores=[];

function abrirEditor(){
esconderTudo();
document.getElementById("editor").classList.remove("hidden");
}

function abrirTime(){
esconderTudo();
document.getElementById("time").classList.remove("hidden");
mostrarTime();
}

function abrirPartida(){
esconderTudo();
document.getElementById("partida").classList.remove("hidden");
}

function esconderTudo(){
document.getElementById("editor").classList.add("hidden");
document.getElementById("time").classList.add("hidden");
document.getElementById("partida").classList.add("hidden");
}

function salvarJogador(){
let nome=document.getElementById("nome").value;
let sexo=document.getElementById("sexo").value;
let posicao=document.getElementById("posicao").value;

if(!nome) return;

jogadores.push({
nome,
sexo,
posicao
});

mostrarJogadores();
mostrarTime();

document.getElementById("nome").value="";
}

function excluirJogador(){
jogadores.pop();
mostrarJogadores();
mostrarTime();
}

function mostrarJogadores(){
let area=document.getElementById("listaJogadores");
area.innerHTML="";

jogadores.forEach(j=>{
area.innerHTML+=`
<div class="player">
${j.nome} — ${j.sexo} — ${j.posicao}
</div>
`;
});
}

function mostrarTime(){
let area=document.getElementById("listaTime");
area.innerHTML="";

jogadores.slice(0,8).forEach((j,i)=>{
let tipo=i<4 ? "Titular" : "Reserva";

area.innerHTML+=`
<div class="player">
${tipo}: ${j.nome}
</div>
`;
});
}
</script>

</body>
  </html>
